environment: lab_robot
services:
  core: required
  navigation: required
  perception: required
  speech: required
  tts: required
  safety: required
  dashboard: required
  monitoring: required
safety:
  min_battery_pct: 40
  require_estop: true
  require_operator_authorization: true
deployment:
  allow_dry_run: true
  require_rollback_version: true
