services:
  core:
    image: bonbon/ros2:${BONBON_IMAGE_TAG:?set BONBON_IMAGE_TAG}
    network_mode: host
    restart: unless-stopped
    env_file: /etc/bonbon/bonbon.env
    volumes:
      - /etc/bonbon:/config:ro
      # Persistent data dir must match the image's BONBON_DATA_DIR so SQLite /
      # FAISS / ChromaDB / audit logs survive container restarts.
      - /var/lib/bonbon:/var/bonbon/data
      - /var/log/bonbon:/logs
    # External hardware passthrough (Raspberry Pi). Adjust device paths to match
    # `bash scripts/pi_hardware_check.sh`. Missing devices can be commented out
    # for a partial bring-up.
    devices:
      - "/dev/video0:/dev/video0"     # USB camera (V4L2)
      - "/dev/snd:/dev/snd"           # USB mic + speaker (ALSA)
      - "/dev/i2c-1:/dev/i2c-1"       # IMU + battery monitor
      - "/dev/gpiomem:/dev/gpiomem"   # e-stop GPIO
      - "/dev/ttyUSB0:/dev/ttyUSB0"   # LIDAR (USB serial)
      - "/dev/ttyUSB1:/dev/ttyUSB1"   # servos (USB serial)
    group_add: ["audio", "video", "i2c", "dialout", "gpio"]
    command: "source /opt/ros/humble/setup.bash && source /opt/bonbon/install/setup.bash && ros2 launch bonbon_bringup bringup.launch.py"
    security_opt: ["no-new-privileges:true"]

  navigation:
    image: bonbon/navigation:${BONBON_IMAGE_TAG:?set BONBON_IMAGE_TAG}
    network_mode: host
    restart: unless-stopped
    env_file: /etc/bonbon/bonbon.env
    volumes:
      - /etc/bonbon:/config:ro
      - /opt/bonbon/maps:/maps:ro
      - /var/log/bonbon:/logs
    security_opt: ["no-new-privileges:true"]

  ai:
    image: bonbon/ai:${BONBON_IMAGE_TAG:?set BONBON_IMAGE_TAG}
    network_mode: host
    restart: unless-stopped
    env_file: /etc/bonbon/bonbon.env
    volumes:
      - /opt/bonbon/models:/models:ro
      - /var/log/bonbon:/logs
    security_opt: ["no-new-privileges:true"]

  perception:
    image: bonbon/ai:${BONBON_IMAGE_TAG:?set BONBON_IMAGE_TAG}
    network_mode: host
    restart: unless-stopped
    env_file: /etc/bonbon/bonbon.env
    volumes:
      - /opt/bonbon/models:/models:ro
      - /var/log/bonbon:/logs
    command: "source /opt/ros/humble/setup.bash && source /opt/bonbon/install/setup.bash && ros2 launch bonbon_perception_ai perception.launch.py"
    security_opt: ["no-new-privileges:true"]

  speech:
    image: bonbon/ros2:${BONBON_IMAGE_TAG:?set BONBON_IMAGE_TAG}
    network_mode: host
    restart: unless-stopped
    env_file: /etc/bonbon/bonbon.env
    volumes:
      - /etc/bonbon:/config:ro
      - /var/log/bonbon:/logs
    command: "source /opt/ros/humble/setup.bash && source /opt/bonbon/install/setup.bash && ros2 launch bonbon_speech speech.launch.py"
    security_opt: ["no-new-privileges:true"]

  tts:
    image: bonbon/ros2:${BONBON_IMAGE_TAG:?set BONBON_IMAGE_TAG}
    network_mode: host
    restart: unless-stopped
    env_file: /etc/bonbon/bonbon.env
    volumes:
      - /etc/bonbon:/config:ro
      - /var/log/bonbon:/logs
    command: "source /opt/ros/humble/setup.bash && source /opt/bonbon/install/setup.bash && ros2 launch bonbon_tts tts.launch.py"
    security_opt: ["no-new-privileges:true"]

  safety:
    image: bonbon/ros2:${BONBON_IMAGE_TAG:?set BONBON_IMAGE_TAG}
    network_mode: host
    restart: unless-stopped
    env_file: /etc/bonbon/bonbon.env
    volumes:
      - /etc/bonbon:/config:ro
      - /var/log/bonbon:/logs
    command: "source /opt/ros/humble/setup.bash && source /opt/bonbon/install/setup.bash && ros2 launch bonbon_safety safety.launch.py"
    security_opt: ["no-new-privileges:true"]

  dashboard-api:
    image: bonbon/dashboard:${BONBON_IMAGE_TAG:?set BONBON_IMAGE_TAG}
    network_mode: host
    restart: unless-stopped
    env_file: /etc/bonbon/bonbon.env
    volumes:
      - /etc/bonbon:/config:ro
      - /var/log/bonbon:/logs
    security_opt: ["no-new-privileges:true"]

  monitoring:
    image: prom/prometheus:v2.52.0
    network_mode: host
    restart: unless-stopped
    volumes:
      - /etc/bonbon/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /var/lib/bonbon/prometheus:/prometheus
