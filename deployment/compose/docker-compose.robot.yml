      - /var/log/bonbon:/logs
    security_opt: ["no-new-privileges:true"]

  monitoring:
    image: prom/prometheus:v2.52.0
    network_mode: host
    restart: unless-stopped
    volumes:
      - /etc/bonbon/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /var/lib/bonbon/prometheus:/prometheus
