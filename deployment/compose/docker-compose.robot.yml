      - /etc/bonbon:/config:ro
      - /var/log/bonbon:/logs
    command: "source /opt/ros/humble/setup.bash && source /opt/bonbon/install/setup.bash && ros2 launch bonbon_speech speech.launch.py"
    security_opt: ["no-new-privileges:true"]

  tts:
    image: bonbon/ros2:${BONBON_IMAGE_TAG:?set BONBON_IMAGE_TAG}
    network_mode: host
    restart: unless-stopped
    env_file: /etc/bonbon/bonbon.env
    volumes:
      - /etc/bonbon:/config:ro
      - /var/log/bonbon:/logs
    command: "source /opt/ros/humble/setup.bash && source /opt/bonbon/install/setup.bash && ros2 launch bonbon_tts tts.launch.py"
    security_opt: ["no-new-privileges:true"]

  safety:
    image: bonbon/ros2:${BONBON_IMAGE_TAG:?set BONBON_IMAGE_TAG}
    network_mode: host
    restart: unless-stopped
    env_file: /etc/bonbon/bonbon.env
    volumes:
      - /etc/bonbon:/config:ro
      - /var/log/bonbon:/logs
    command: "source /opt/ros/humble/setup.bash && source /opt/bonbon/install/setup.bash && ros2 launch bonbon_safety safety.launch.py"
    security_opt: ["no-new-privileges:true"]

  dashboard-api:
    image: bonbon/dashboard:${BONBON_IMAGE_TAG:?set BONBON_IMAGE_TAG}
    network_mode: host
    restart: unless-stopped
    env_file: /etc/bonbon/bonbon.env
