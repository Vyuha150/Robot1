name: BonBon Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: staging
        type: choice
        options: [lab, staging, production]
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate release version
        run: python devops/scripts/release_version.py --channel "${{ inputs.channel || 'tag' }}"
      - name: Build release archive
        run: |
          tar --exclude=.git --exclude=.env --exclude=.venv -czf bonbon-release.tar.gz .
          sha256sum bonbon-release.tar.gz > bonbon-release.tar.gz.sha256
      - name: Verify checksum
        run: python devops/scripts/verify_release.py --artifact bonbon-release.tar.gz --sha256 bonbon-release.tar.gz.sha256
      - name: Sign checksum with cosign keyless
        uses: sigstore/cosign-installer@v3
      - name: Create signature
        run: cosign sign-blob --yes --output-signature bonbon-release.tar.gz.sig bonbon-release.tar.gz
      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-artifacts
          path: |
            bonbon-release.tar.gz
            bonbon-release.tar.gz.sha256
            bonbon-release.tar.gz.sig
            deployment/ota/release_metadata.env
